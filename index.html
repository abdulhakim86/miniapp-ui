<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSphere</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f4f4f0; 
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 2D Стикер-стиль */
        .sticker-card {
            background: #ffffff;
            border: 4px solid #111;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 6px 6px 0px #111; /* Резкая смещенная тень */
            margin-top: 30px;
            position: relative;
        }
        
        /* Декоративный стикер сбоку */
        .badge {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #ff4757;
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border: 3px solid #111;
            border-radius: 50px;
            transform: rotate(15deg);
            box-shadow: 3px 3px 0px #111;
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        p {
            font-size: 16px;
            font-weight: 500;
        }
        
        .user-name {
            color: #2ed573;
            font-weight: 900;
            font-size: 18px;
            background: #111;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 5px;
        }
        
        button {
            margin-top: 25px;
            background: #ffa502;
            color: #111;
            border: 4px solid #111;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            box-shadow: 4px 4px 0px #111;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111;
        }
    </style>
</head>
<body>

    <div class="sticker-card">
        <div class="badge">BETA</div>
        <h1>MediSphere Archive</h1>
        <p>Привет, <span class="user-name" id="username">студент</span>!</p>
        <p>Интерактивный архив готов к работе.</p>
        <button onclick="tg.close()">Закрыть</button>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Вытаскиваем имя пользователя (или ставим дефолтное, если открыли вне ТГ)
        let username = tg.initDataUnsafe?.user?.first_name || "хирург";
        document.getElementById("username").innerText = username;
        
        tg.ready();
    </script>
</body>
</html>
